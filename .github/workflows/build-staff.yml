name: Build OcuLauncher Staff

# Edizione STAFF (accesso locale, senza Microsoft). Parte con un tag v*-staff
# (es. v1.0.0-staff). Pubblica una PRE-RELEASE separata: non diventa "latest"
# e non finisce sulla pagina pubblica. La build pubblica (build.yml) ignora
# i tag *-staff, così non parte due volte.
on:
  push:
    tags: ['v*-staff']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            args: --win --x64 --arm64
          - os: macos-latest
            args: --mac --x64 --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm install --no-audit --no-fund

      - name: Attiva edizione Staff + versione dal tag
        shell: bash
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('src/edition.json',JSON.stringify({edition:'staff'},null,2))"
          VER="${GITHUB_REF_NAME#v}"; if [ -z "$VER" ] || [ "$VER" = "$GITHUB_REF_NAME" ]; then VER="1.0.0-staff"; fi
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VER}';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "Edizione staff, versione ${VER} (tag ${GITHUB_REF_NAME})"

      - name: Compila e pubblica (pre-release Staff)
        run: npx electron-builder --config electron-builder-staff.yml ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

